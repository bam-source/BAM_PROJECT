<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LINK.NET</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background: radial-gradient(circle at top left, rgba(147,51,234,.18), transparent 40%), #09090b;
            color: #e8ecf4;
            font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }
        .loader {
            width: min(520px, calc(100% - 32px));
            padding: 28px;
            border: 1px solid rgba(255,255,255,.1);
            border-radius: 20px;
            background: rgba(22,27,39,.88);
            box-shadow: 0 24px 60px rgba(0,0,0,.35);
            text-align: center;
        }
        .loader h1 { margin: 0 0 8px; font-size: 28px; }
        .loader p { margin: 0; color: #9ca3af; line-height: 1.6; }
        .loader a { color: #c084fc; }
    </style>
</head>
<body>
    <div class="loader">
        <h1>LINK.NET</h1>
        <p>Memuat aplikasi LINK.NET...</p>
    </div>

    <script>
        (async function loadLinknet() {
            const sourceUrl = "https://raw.githubusercontent.com/bam-source/linknet/main/index.html";
            const assetBase = "https://raw.githubusercontent.com/bam-source/linknet/main/";

            try {
                const response = await fetch(sourceUrl, { cache: "no-store" });
                if (!response.ok) throw new Error("Gagal memuat LINK.NET");

                let html = await response.text();
                html = html.replace(/<head>/i, `<head><base href="${assetBase}">`);
                html = html.replaceAll('./Gambar/', `${assetBase}Gambar/`);
                html = html.replaceAll('"Gambar/', `"${assetBase}Gambar/`);
                html = html.replaceAll("'Gambar/", `'${assetBase}Gambar/`);

                document.open();
                document.write(html);
                document.close();
            } catch (error) {
                document.body.innerHTML = `
                    <div class="loader">
                        <h1>LINK.NET</h1>
                        <p>Gagal memuat aplikasi. Buka sumber asli di
                            <a href="https://github.com/bam-source/linknet" target="_blank" rel="noopener">repo linknet</a>.
                        </p>
                    </div>
                `;
            }
        })();
    </script>
</body>
</html>
