<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BAM PROJECT</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Barlow+Condensed:ital,wght@0,400;0,700;0,900&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f3f4f6;
            --red: #dc2626;
            --red-bright: #ef4444;
            --red-border: rgba(220,38,38,0.28);
            --red-subtle: rgba(220,38,38,0.08);
            --white: #111827;
            --gray: #4b5563;
            --gray-dim: #6b7280;
            --card-bg: #ffffff;
            --border: rgba(17,24,39,0.12);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; }
        body {
            min-height: 100vh;
            overflow-x: hidden;
            background-color: var(--bg);
            background-image:
                radial-gradient(ellipse 80% 50% at 10% -10%, rgba(220,38,38,0.07), transparent 60%),
                radial-gradient(ellipse 60% 40% at 90% 110%, rgba(15,23,42,0.06), transparent 60%);
            color: var(--white);
            font-family: 'Barlow', sans-serif;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            z-index: 0;
            opacity: 0.03;
            pointer-events: none;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
        }

        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            min-height: 64px;
            background: linear-gradient(180deg, rgba(255,255,255,0.98), rgba(248,250,252,0.95));
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(17,24,39,0.14);
            box-shadow: 0 12px 28px rgba(15,23,42,0.12);
        }

        nav::after {
            content: '';
            position: absolute;
            left: 0;
            right: 0;
            bottom: -1px;
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(220,38,38,0.62), transparent);
            pointer-events: none;
        }

        .nav-inner {
            width: 100%;
            max-width: 1200px;
            min-height: 64px;
            margin: 0 auto;
            padding: 0 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 18px;
        }

        .nav-logo {
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--white);
            text-decoration: none;
            min-width: max-content;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            background: var(--red);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 16px rgba(220,38,38,0.5);
        }

        .logo-text {
            font-family: 'Rajdhani', sans-serif;
            font-weight: 700;
            font-size: 20px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .logo-text span { color: var(--red-bright); }

        .category-nav {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 8px;
            min-width: 0;
            margin-left: auto;
            height: 100%;
            overflow-x: auto;
            scrollbar-width: none;
        }

        .category-nav::-webkit-scrollbar { display: none; }

        .category-tab,
        .nav-cta,
        .btn-primary,
        .btn-ghost,
        .product-link,
        .social-pill {
            border: 0;
            cursor: pointer;
            text-decoration: none;
            font-family: 'Rajdhani', sans-serif;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        .category-tab {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            min-height: 32px;
            padding: 6px 12px;
            border: 1px solid transparent;
            border-radius: 7px;
            background: transparent;
            color: #374151;
            font-size: 13px;
            white-space: nowrap;
            transition: all 0.2s;
        }

        .category-tab:hover {
            color: var(--red);
            border-color: var(--red-border);
            background: rgba(220,38,38,0.10);
        }

        .nav-cta {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: var(--red);
            color: #fff;
            min-height: 36px;
            padding: 0 16px;
            border-radius: 8px;
            box-shadow: 0 4px 14px rgba(220,38,38,0.35);
            white-space: nowrap;
        }

        .nav-menu-btn {
            display: none;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            border: 1px solid rgba(239,68,68,0.28);
            border-radius: 8px;
            background: rgba(220,38,38,0.08);
            color: var(--red);
        }

        .page {
            position: relative;
            z-index: 1;
            max-width: 1200px;
            margin: 0 auto;
            padding: 104px 24px 42px;
        }

        .page::after {
            content: '';
            display: block;
            width: 100%;
            height: 1px;
            margin-top: 28px;
            background: linear-gradient(90deg, transparent, rgba(17,24,39,0.18), transparent);
        }

        .hero {
            display: grid;
            grid-template-columns: minmax(0, 1fr) minmax(300px, 420px);
            gap: 28px;
            align-items: center;
            min-height: 360px;
            margin-bottom: 22px;
        }

        .hero-copybox {
            max-width: 590px;
        }

        .eyebrow {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 14px;
            padding: 4px 12px;
            border: 1px solid var(--red-border);
            border-radius: 99px;
            background: var(--red-subtle);
            color: var(--red-bright);
            font-family: 'Rajdhani', sans-serif;
            font-weight: 700;
            font-size: 11px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .eyebrow .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--red-bright);
            box-shadow: 0 0 8px var(--red);
        }

        h1 {
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 900;
            font-size: clamp(50px, 6vw, 78px);
            line-height: 0.96;
            text-transform: uppercase;
            margin-bottom: 16px;
        }

        h1 span { color: var(--red-bright); }

        .hero-copy {
            max-width: 520px;
            color: var(--gray);
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .hero-actions { display: flex; gap: 10px; flex-wrap: wrap; }

        .btn-primary,
        .btn-ghost {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            min-height: 38px;
            padding: 0 16px;
            border-radius: 8px;
            font-size: 13px;
        }

        .btn-primary { background: var(--red); color: #fff; box-shadow: 0 8px 22px rgba(220,38,38,0.28); }
        .btn-ghost { color: var(--white); border: 1px solid var(--border); background: rgba(255,255,255,0.72); }

        .hero-panel {
            border: 1px solid var(--border);
            border-radius: 8px;
            background: linear-gradient(145deg, #ffffff, #f8fafc);
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(15,23,42,0.12);
        }

        .hero-image {
            min-height: 170px;
            background-color: #e5e7eb;
            background-image:
                linear-gradient(to top, rgba(255,255,255,0.52), rgba(255,255,255,0.08)),
                url("assets/Logo_BAM_Transparant.png");
            background-position: center, center;
            background-size: cover, contain;
            background-repeat: no-repeat, no-repeat;
        }

        .hero-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            padding: 12px;
        }

        .metric {
            border: 1px solid var(--border);
            border-radius: 8px;
            background: #f8fafc;
            padding: 10px;
        }

        .metric strong {
            display: block;
            color: var(--red-bright);
            font-family: 'Rajdhani', sans-serif;
            font-size: 19px;
            line-height: 1;
        }

        .metric span {
            display: block;
            margin-top: 5px;
            color: var(--gray);
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        .section {
            position: relative;
            padding: 46px 0 12px;
        }

        .section + .section {
            margin-top: 22px;
        }

        .section::before {
            content: '';
            display: block;
            height: 1px;
            margin-bottom: 34px;
            background: linear-gradient(90deg, rgba(220,38,38,0.32), rgba(17,24,39,0.12), transparent);
        }

        .section-header {
            display: flex;
            align-items: end;
            justify-content: space-between;
            gap: 18px;
            margin-bottom: 16px;
        }

        .section-tag {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 8px;
            padding: 4px 10px;
            border: 1px solid rgba(239,68,68,0.55);
            border-radius: 999px;
            background: linear-gradient(180deg, rgba(239,68,68,0.95), rgba(185,28,28,0.95));
            color: #fff;
            font-family: 'Rajdhani', sans-serif;
            font-weight: 700;
            font-size: 11px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            box-shadow: 0 6px 16px rgba(220,38,38,0.18);
        }

        .section-title {
            font-family: 'Rajdhani', sans-serif;
            font-size: 26px;
            line-height: 1;
            text-transform: uppercase;
        }

        .section-desc {
            max-width: 460px;
            color: var(--gray);
            font-size: 13px;
            line-height: 1.5;
        }

        .category-section-list {
            display: grid;
            gap: 16px;
        }

        .category-product-section {
            border: 1px solid var(--red-border);
            border-radius: 8px;
            background: #ffffff;
            overflow: hidden;
        }

        .category-product-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 14px;
            padding: 12px 14px;
            border-bottom: 1px solid var(--border);
            background: #f8fafc;
        }

        .category-actions {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }

        .category-product-title {
            display: flex;
            align-items: center;
            gap: 9px;
            min-width: 0;
        }

        .category-product-title h3 {
            display: inline-flex;
            align-items: center;
            width: fit-content;
            padding: 5px 11px;
            border: 1px solid rgba(239,68,68,0.55);
            border-radius: 8px;
            background: linear-gradient(180deg, rgba(239,68,68,0.95), rgba(185,28,28,0.95));
            color: #fff;
            font-family: 'Rajdhani', sans-serif;
            font-size: 20px;
            line-height: 1;
            text-transform: uppercase;
            box-shadow: 0 8px 18px rgba(220,38,38,0.18);
        }

        .category-product-title span {
            display: inline-flex;
            width: fit-content;
            margin-top: 5px;
            padding: 3px 9px;
            border: 1px solid rgba(239,68,68,0.55);
            border-radius: 999px;
            background: var(--red);
            color: #fff;
            font-family: 'Rajdhani', sans-serif;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.06em;
            text-transform: uppercase;
        }

        .product-grid {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            scroll-behavior: smooth;
            padding: 14px;
            scrollbar-width: thin;
            scrollbar-color: var(--red-dim) transparent;
        }

        .product-grid::-webkit-scrollbar { height: 4px; }
        .product-grid::-webkit-scrollbar-thumb { background: var(--red-dim); border-radius: 99px; }

        .product-grid .product-card {
            flex: 0 0 154px;
            scroll-snap-align: start;
        }

        .product-card {
            min-width: 0;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--card-bg);
            overflow: hidden;
            color: var(--white);
            text-decoration: none;
            transition: transform 0.2s, border-color 0.2s, background 0.2s;
        }

        .product-card:hover {
            transform: translateY(-2px);
            border-color: var(--red-border);
            background: #f9fafb;
        }

        .product-media {
            min-height: 96px;
            position: relative;
            background-size: cover;
            background-position: center;
        }

        .product-media::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(13,11,11,0.94), rgba(13,11,11,0.08));
        }

        .product-category {
            position: absolute;
            left: 9px;
            top: 9px;
            z-index: 1;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 3px 7px;
            border: 1px solid var(--red-border);
            border-radius: 99px;
            background: rgba(255,255,255,0.90);
            color: var(--red-bright);
            font-family: 'Rajdhani', sans-serif;
            font-size: 9px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        .product-body { padding: 10px; }

        .product-title {
            font-family: 'Rajdhani', sans-serif;
            font-size: 12.5px;
            font-weight: 700;
            line-height: 1.05;
            text-transform: uppercase;
            letter-spacing: 0.03em;
            font-style: italic;
        }

        .product-text {
            margin-top: 5px;
            color: var(--gray);
            font-size: 9px;
            line-height: 1.35;
            min-height: 24px;
        }

        .product-foot {
            margin-top: 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            padding-top: 9px;
            border-top: 1px solid var(--border);
        }

        .product-price {
            flex-shrink: 0;
            color: #fff;
            background: var(--red);
            border-radius: 5px;
            padding: 3px 7px;
            font-family: 'Rajdhani', sans-serif;
            font-size: 9.5px;
            font-weight: 700;
            white-space: nowrap;
            font-style: italic;
        }

        .product-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--red);
            font-size: 10px;
            white-space: nowrap;
        }

        .testi-scroll {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            padding: 2px 0 14px;
            scroll-snap-type: x mandatory;
            scrollbar-width: thin;
            scrollbar-color: var(--red-dim) transparent;
        }

        .testi-scroll::-webkit-scrollbar { height: 4px; }
        .testi-scroll::-webkit-scrollbar-thumb { background: var(--red-dim); border-radius: 99px; }

        .testi-card {
            position: relative;
            flex: 0 0 190px;
            height: 160px;
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            scroll-snap-align: start;
            background: #ffffff;
        }

        .testi-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: top;
        }

        .testi-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.78), transparent 55%);
            pointer-events: none;
        }

        .testi-info {
            position: absolute;
            left: 10px;
            right: 10px;
            bottom: 9px;
        }

        .testi-verified {
            display: flex;
            align-items: center;
            gap: 5px;
            margin-bottom: 4px;
            font-family: 'Rajdhani', sans-serif;
            font-size: 8px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        .testi-verified-dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: var(--red-bright);
            box-shadow: 0 0 6px var(--red);
        }

        .testi-stars { display: flex; gap: 2px; }

        .lightbox {
            position: fixed;
            inset: 0;
            z-index: 220;
            display: none;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.94);
            cursor: zoom-out;
            padding: 20px;
        }

        .lightbox.active { display: flex; }
        .lightbox img { max-width: 92%; max-height: 88vh; border-radius: 8px; }

        .social-row {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .social-pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            min-height: 36px;
            padding: 0 13px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: #ffffff;
            color: var(--white);
        }

        footer {
            position: relative;
            z-index: 1;
            border-top: 1px solid rgba(17,24,39,0.16);
            background: rgba(255,255,255,0.88);
            box-shadow: 0 -12px 28px rgba(15,23,42,0.06);
            padding: 22px 24px;
            text-align: center;
            color: var(--gray-dim);
            font-family: 'Rajdhani', sans-serif;
            font-size: 12px;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        .modal-overlay {
            position: fixed;
            inset: 0;
            z-index: 200;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: rgba(0,0,0,0.76);
            backdrop-filter: blur(12px);
        }

        .modal-overlay.open { display: flex; }

        .contact-box {
            width: min(420px, 100%);
            border: 1px solid var(--red-border);
            border-radius: 8px;
            background: #ffffff;
            padding: 24px;
            position: relative;
        }

        .modal-close {
            position: absolute;
            top: 12px;
            right: 12px;
            width: 34px;
            height: 34px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: #f8fafc;
            color: var(--white);
            cursor: pointer;
        }

        .contact-title {
            font-family: 'Rajdhani', sans-serif;
            font-size: 28px;
            text-transform: uppercase;
            margin-bottom: 16px;
        }

        .contact-list { display: grid; gap: 10px; }

        .contact-item {
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px solid var(--border);
            background: #f8fafc;
            color: var(--white);
            text-decoration: none;
            padding: 13px;
            border-radius: 8px;
            font-family: 'Rajdhani', sans-serif;
            font-weight: 700;
            text-transform: uppercase;
        }

        @media (max-width: 920px) {
            nav { min-height: 54px; }
            .nav-inner {
                position: relative;
                min-height: 54px;
                justify-content: space-between;
                gap: 8px;
                padding: 0 14px;
            }

            .nav-menu-btn { display: inline-flex; }

            .category-nav {
                position: absolute;
                left: 14px;
                right: 14px;
                top: calc(100% + 8px);
                display: none;
                flex-direction: column;
                justify-content: flex-start;
                align-items: stretch;
                width: auto;
                height: auto;
                padding: 8px;
                border: 1px solid rgba(239,68,68,0.28);
                border-radius: 10px;
                background: rgba(255,255,255,0.98);
                box-shadow: 0 16px 34px rgba(15,23,42,0.16);
                margin-left: 0;
                gap: 6px;
                overflow: visible;
                z-index: 120;
            }

            nav.nav-open .category-nav { display: flex; }

            .category-tab,
            .category-nav .nav-cta {
                justify-content: flex-start;
                width: 100%;
                height: 32px;
                padding: 0 10px;
                font-size: 11px;
                border-radius: 7px;
            }

            .category-nav .nav-cta { justify-content: center; }
            .page { padding-top: 72px; }
            .hero { grid-template-columns: 1fr; min-height: 0; margin-bottom: 12px; }
        }

        @media (max-width: 720px) {
            .page { padding: 70px 14px 28px; }
            .nav-inner { min-height: 54px; padding: 6px 12px; }
            .logo-icon { width: 28px; height: 28px; border-radius: 7px; }
            .logo-text { font-size: 17px; letter-spacing: 0.06em; }
            .category-nav { gap: 5px; }
            .category-tab { height: 30px; padding: 0 9px; font-size: 10px; }
            .category-nav .nav-cta { height: 30px; padding: 0 10px; font-size: 10.5px; gap: 6px; border-radius: 7px; }
            h1 { font-size: 40px; margin-bottom: 10px; }
            .eyebrow { margin-bottom: 10px; padding: 3px 10px; font-size: 10px; }
            .section-tag { padding: 3px 9px; font-size: 10px; }
            .hero { gap: 14px; }
            .hero-actions { gap: 8px; }
            .btn-primary,
            .btn-ghost { min-height: 34px; padding: 0 12px; font-size: 12px; }
            .hero-panel { box-shadow: 0 14px 34px rgba(0,0,0,0.28); }
            .hero-image { min-height: 96px; }
            .hero-stats { grid-template-columns: 1fr 1fr 1fr; gap: 6px; padding: 8px; }
            .metric { padding: 7px; border-radius: 7px; }
            .metric strong { font-size: 16px; }
            .metric span { font-size: 8px; }
            .section { padding: 34px 0 8px; }
            .section + .section { margin-top: 14px; }
            .section::before { margin-bottom: 24px; }
            .section-header { align-items: flex-start; flex-direction: column; }
            .category-product-head { align-items: flex-start; flex-direction: column; }
            .category-product-title h3 { font-size: 15px; padding: 4px 9px; border-radius: 7px; }
            .category-product-title span { font-size: 8.5px; padding: 2px 7px; }
            .category-product-section { padding: 12px; }
            .product-grid { gap: 8px; padding: 10px; }
            .product-grid .product-card { flex-basis: 136px; }
            .product-media { min-height: 76px; }
            .product-body { padding: 9px; }
            .product-title { font-size: 11.5px; }
            .product-text { font-size: 8.8px; min-height: 22px; }
            .product-foot { gap: 7px; }
        }

        @media (max-width: 390px) {
            .logo-text { font-size: 16px; }
            .category-nav .nav-cta i { display: inline-block; }
            .category-nav .nav-cta { padding: 0 10px; }
            .category-product-title h3 { font-size: 13px; padding: 4px 8px; }
            .btn-primary,
            .btn-ghost { flex: 1 1 calc(50% - 8px); }
        }

        @media (max-width: 480px) {
            .page { padding-left: 12px; padding-right: 12px; }
            .category-nav { left: 12px; right: 12px; }
            h1 { font-size: clamp(34px, 11vw, 40px); }
            .hero-image { min-height: clamp(82px, 24vw, 96px); }
            .hero-stats { gap: 5px; padding: 7px; }
            .metric { padding: 6px 5px; }
            .metric strong { font-size: 15px; }
            .metric span { font-size: 7.5px; letter-spacing: 0.04em; }
            .section-title { font-size: 22px; }
            .category-product-section { padding: 10px; }
            .category-product-head { gap: 10px; padding: 10px; }
            .product-grid .product-card { flex-basis: 128px; }
            .product-media { min-height: 70px; }
            .product-body { padding: 8px; }
            .product-title { font-size: 11px; }
            .product-text { font-size: 8.2px; min-height: 20px; }
            .product-price { font-size: 8.5px; padding: 3px 5px; }
            .product-link { font-size: 9px; }
        }

        @media (max-width: 340px) {
            .nav-inner { padding-left: 10px; padding-right: 10px; }
            .logo-icon { width: 26px; height: 26px; }
            .logo-text { font-size: 14px; }
            .nav-menu-btn { width: 28px; height: 28px; }
            .category-nav .nav-cta { width: 100%; height: 30px; padding: 0 10px; font-size: 10px; }
            .category-nav .nav-cta i { display: inline-block; font-size: 12px; }
            .page { padding-top: 66px; }
            .hero-actions { flex-direction: column; }
            .btn-primary,
            .btn-ghost { width: 100%; flex-basis: auto; }
            .hero-stats { grid-template-columns: 1fr; }
            .product-grid .product-card { flex-basis: 122px; }
        }
    </style>
</head>
<body>
    <nav>
        <div class="nav-inner">
            <a href="index.html" class="nav-logo">
                <div class="logo-icon"><i class="fa-solid fa-layer-group" style="color:#fff;font-size:13px;"></i></div>
                <span class="logo-text">BAM<span>PROJECT</span></span>
            </a>
            <button class="nav-menu-btn" onclick="toggleNavMenu()" aria-label="Buka menu navigasi"><i class="fa-solid fa-bars"></i></button>
            <div class="category-nav" id="category-nav"></div>
        </div>
    </nav>

    <main class="page">
        <section class="hero">
            <div class="hero-copybox">
                <div class="eyebrow"><span class="dot"></span> Pusat Project Digital Game</div>
                <h1>BAM <span>PROJECT</span></h1>
                <div class="hero-actions">
                    <a class="btn-primary" href="#produk"><i class="fa-solid fa-box-open"></i> Lihat Produk</a>
                    <button class="btn-ghost" onclick="openContact()">Hubungi Admin</button>
                </div>
            </div>
            <div class="hero-panel">
                <div class="hero-image"></div>
                <div class="hero-stats" id="hero-stats"></div>
            </div>
        </section>

        <section id="produk" class="section">
            <div class="section-header">
                <div>
                    <span class="section-tag">Semua Kategori</span>
                    <h2 class="section-title">Semua Produk</h2>
                </div>
            </div>
            <div class="category-section-list" id="product-list"></div>
        </section>

        <section class="section">
            <div class="section-header">
                <div>
                    <span class="section-tag">Verified Buyers</span>
                    <h2 class="section-title">Testimoni</h2>
                </div>
                <a class="product-link" href="#" onclick="goTo('discord'); return false;">Lihat Lebih Banyak <i class="fa-brands fa-discord"></i></a>
            </div>
            <div id="testi-scroll-container" class="testi-scroll"></div>
        </section>

        <section class="section">
            <div class="section-header">
                <div>
                    <span class="section-tag">Kontak</span>
                    <h2 class="section-title">Hubungi Admin</h2>
                </div>
                <div class="social-row" id="social-row"></div>
            </div>
        </section>
    </main>

    <footer>BAM PROJECT - Digital Game Project Hub</footer>

    <div id="contact-modal" class="modal-overlay" onclick="if(event.target===this)closeContact()">
        <div class="contact-box">
            <button class="modal-close" onclick="closeContact()"><i class="fa-solid fa-xmark"></i></button>
            <div class="contact-title">Kontak <span style="color:var(--red-bright);">Admin</span></div>
            <div class="contact-list" id="contact-list"></div>
        </div>
    </div>

    <div id="lightbox" class="lightbox" onclick="closeLightbox()">
        <img id="lightbox-img" src="" alt="Testimoni Preview">
    </div>

    <script src="project-data.js"></script>
    <script>
        const { SOCIAL, SOCIAL_LINKS, TESTIMONIAL_SOURCE, PROJECT_CATEGORIES, PRODUCTS_BY_CATEGORY } = window.PROJECT_DATA;

        function renderCategoryNav() {
            const nav = document.getElementById('category-nav');
            nav.innerHTML = `
                <a class="category-tab" href="index.html" onclick="closeNavMenu()">
                    <i class="fa-solid fa-house"></i>
                    Home
                </a>
                ${PROJECT_CATEGORIES.map(category => `
                <a class="category-tab" href="${category.href}" onclick="closeNavMenu()">
                    <i class="fa-solid ${category.icon}"></i>
                    ${category.name}
                </a>
                `).join('')}
                <button class="nav-cta" onclick="openContact(); closeNavMenu();">
                    <i class="fa-solid fa-headset"></i>
                    Kontak Admin
                </button>
            `;
        }

        function normalizeProduct(product) {
            return {
                id: product.id || product.name,
                name: (product.name || 'Project').replace(/\s+/g, ' ').trim(),
                subtitle: product.subtitle || product.tag || '',
                price: product.price === '-' ? 'Dalam Proses' : (product.price || 'Konsultasi Admin'),
                image: product.image || '',
                status: product.price === '-' ? 'soon' : product.status
            };
        }

        function loadCategoryProducts(category) {
            const products = PRODUCTS_BY_CATEGORY?.[category.id] || [];
            return {
                ...category,
                products: products.map(product => ({ ...normalizeProduct(product), category }))
            };
        }

        function loadAllCategoryProducts() {
            return PROJECT_CATEGORIES.map(loadCategoryProducts);
        }

        function renderHeroStats(categories) {
            const products = categories.flatMap(category => category.products);
            const activeCount = products.filter(product => product.status !== 'soon').length;
            document.getElementById('hero-stats').innerHTML = `
                <div class="metric"><strong>${PROJECT_CATEGORIES.length}</strong><span>Kategori</span></div>
                <div class="metric"><strong>${products.length}</strong><span>Produk</span></div>
                <div class="metric"><strong>${activeCount}</strong><span>Aktif</span></div>
            `;
        }

        function renderProductCard(product) {
            return `
                <a class="product-card" href="${product.category.href}">
                    <div class="product-media" style="background-image:url('${product.image}');">
                        <div class="product-category">
                            <i class="fa-solid ${product.category.icon}"></i>
                            ${product.category.label}
                        </div>
                    </div>
                    <div class="product-body">
                        <div class="product-title">${product.name}</div>
                        <p class="product-text">${product.subtitle}</p>
                        <div class="product-foot">
                            <span class="product-price">${product.price}</span>
                            <span class="product-link">Detail <i class="fa-solid fa-chevron-right"></i></span>
                        </div>
                    </div>
                </a>
            `;
        }

        function renderProducts(categories) {
            const list = document.getElementById('product-list');
            list.innerHTML = categories.map(category => {
                const products = category.products;
                return `
                    <section class="category-product-section">
                        <div class="category-product-head">
                            <div class="category-product-title">
                                <i class="fa-solid ${category.icon}" style="color:var(--red-bright);"></i>
                                <div>
                                    <h3>${category.name}</h3>
                                    <span>${products.length} produk</span>
                                </div>
                            </div>
                            <div class="category-actions">
                                <a class="product-link" href="${category.href}">Buka <i class="fa-solid fa-arrow-right"></i></a>
                            </div>
                        </div>
                        <div class="product-grid" id="rail-${category.id}">
                            ${products.map(renderProductCard).join('')}
                        </div>
                    </section>
                `;
            }).join('');
        }

        function renderSocial() {
            const row = document.getElementById('social-row');
            const modal = document.getElementById('contact-list');
            row.innerHTML = SOCIAL_LINKS.map(link => `
                <button class="social-pill" onclick="goTo('${link.id}')">
                    <i class="fa-brands ${link.icon}" style="color:${link.color};"></i>
                    ${link.label}
                </button>
            `).join('');
            modal.innerHTML = SOCIAL_LINKS.map(link => `
                <a class="contact-item" href="${SOCIAL[link.id]}" target="_blank">
                    <i class="fa-brands ${link.icon}" style="color:${link.color};"></i>
                    ${link.label}
                </a>
            `).join('');
        }

        async function renderTestimonials() {
            const container = document.getElementById('testi-scroll-container');
            container.innerHTML = `<div style="padding:16px;color:var(--gray-dim);font-family:'Rajdhani',sans-serif;font-size:13px;">Memuat testimoni...</div>`;
            try {
                const url = `https://api.github.com/repos/${TESTIMONIAL_SOURCE.githubUser}/${TESTIMONIAL_SOURCE.githubRepo}/contents/${TESTIMONIAL_SOURCE.githubFolder}`;
                const res = await fetch(url);
                if (!res.ok) throw new Error('Gagal fetch');
                const files = await res.json();
                const images = files.filter(file => /\.(jpg|jpeg|png|gif|webp)$/i.test(file.name));
                if (!images.length) {
                    container.innerHTML = `<div style="padding:16px;color:var(--gray-dim);font-family:'Rajdhani',sans-serif;font-size:13px;">Testimoni tersedia melalui Discord resmi.</div>`;
                    return;
                }
                const stars = '<i class="fa-solid fa-star" style="color:var(--red-bright);font-size:7px;"></i>'.repeat(5);
                container.innerHTML = images.map(file => {
                    const proxied = 'https://images.weserv.nl/?url=' + encodeURIComponent(file.download_url);
                    return `
                        <div class="testi-card" onclick="openLightbox('${proxied}')">
                            <img src="${proxied}" alt="Testimoni" loading="lazy">
                            <div class="testi-overlay"></div>
                            <div class="testi-info">
                                <div class="testi-verified"><div class="testi-verified-dot"></div><span>Verified</span></div>
                                <div class="testi-stars">${stars}</div>
                            </div>
                        </div>
                    `;
                }).join('');
            } catch (error) {
                container.innerHTML = `<div style="padding:16px;color:var(--gray-dim);font-family:'Rajdhani',sans-serif;font-size:13px;">Gagal memuat testimoni.</div>`;
            }
        }

        function goTo(key) { window.open(SOCIAL[key], '_blank'); }
        function toggleNavMenu() {
            document.querySelector('nav').classList.toggle('nav-open');
        }
        function closeNavMenu() {
            document.querySelector('nav').classList.remove('nav-open');
        }
        function openLightbox(url) {
            document.getElementById('lightbox-img').src = url;
            document.getElementById('lightbox').classList.add('active');
            document.body.style.overflow = 'hidden';
        }
        function closeLightbox() {
            document.getElementById('lightbox').classList.remove('active');
            document.body.style.overflow = 'auto';
        }
        function openContact() { document.getElementById('contact-modal').classList.add('open'); document.body.style.overflow = 'hidden'; }
        function closeContact() { document.getElementById('contact-modal').classList.remove('open'); document.body.style.overflow = 'auto'; }

        window.onload = async () => {
            renderCategoryNav();
            renderSocial();
            const categories = loadAllCategoryProducts();
            renderHeroStats(categories);
            renderProducts(categories);
            await renderTestimonials();
        };
    </script>
</body>
</html>
