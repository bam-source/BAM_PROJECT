<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BAM PROJECT - PROJECT MACRO GAME</title>
    <link rel="icon" type="image/png" href="assets/Logo_BAM_Transparant.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Barlow+Condensed:ital,wght@0,400;0,700;0,900;1,400;1,700;1,900&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/base.css">
    <link rel="stylesheet" href="assets/css/category.css">
    <link rel="stylesheet" href="assets/css/macro-game.css">
</head>
<body data-category-id="macro-recoil">
    <nav id="site-nav" class="site-nav"></nav>

    <main class="page">
        <section class="category-hero">
            <div class="hero-main">
                <div class="eyebrow" id="hero-eyebrow"></div>
                <h1 id="hero-title"></h1>
                <p class="hero-description" id="hero-description"></p>
                <div class="hero-actions">
                    <a class="btn-primary" href="#produk"><i class="fa-solid fa-box-open"></i> Lihat Produk</a>
                    <button class="btn-ghost" type="button" data-open-contact>Hubungi Admin</button>
                </div>
                <div class="hero-stats" id="hero-stats"></div>
            </div>
            <div class="hero-side-stack" id="category-info"></div>
        </section>

        <section id="produk" class="section">
            <div class="section-header">
                <div>
                    <span class="section-tag">Kategori</span>
                    <h2 class="section-title">Daftar Produk</h2>
                </div>
            </div>
            <div class="product-grid" id="product-list"></div>
        </section>

        <section class="section">
            <div class="upgrade-banner">
                <div>
                    <div class="upgrade-title" id="category-cta-title"></div>
                    <div class="upgrade-sub" id="category-cta-desc"></div>
                </div>
                <div id="footer-social-container" class="social-pills"></div>
            </div>
        </section>

        <section id="testimoni" class="section">
            <div class="testimonial-head">
                <div>
                    <div class="verified-pill"><i class="fa-solid fa-star"></i> Verified Buyers</div>
                    <h2 class="testimonial-title">Bukti Transaksi & <span class="text-red">Testimoni</span></h2>
                    <p class="testimonial-sub">Screenshot langsung dari pembeli nyata kami</p>
                </div>
                <button class="testimonial-more" type="button" data-social="discord">
                    <i class="fa-brands fa-discord"></i> Lihat Lebih Banyak
                </button>
            </div>
            <div class="stats-grid">
                <div class="stat-card"><div class="stat-num">500+</div><div class="stat-label">Total Pembeli</div></div>
                <div class="stat-card"><div class="stat-num">4.9★</div><div class="stat-label">Rating</div></div>
                <div class="stat-card"><div class="stat-num">100%</div><div class="stat-label">Lifetime Access</div></div>
            </div>
            <div id="testi-scroll-container" class="testi-scroll"></div>
        </section>
    </main>

    <footer>BAM PROJECT - Project Macro Game</footer>
    <div id="global-modals"></div>
    <div id="product-modal-overlay" class="modal-overlay">
        <div id="product-modal" class="product-modal"></div>
    </div>

    <script src="assets/js/config.js"></script>
    <script src="assets/js/categories/macro-game.config.js"></script>
    <script src="assets/js/common.js"></script>
    <script src="assets/js/category-page.js"></script>
</body>
</html>
